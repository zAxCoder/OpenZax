name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset: openzax-linux-x86_64.tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            asset: openzax-macos-aarch64.tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset: openzax-windows-x86_64.zip

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ matrix.target }}-cargo-

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y pkg-config libssl-dev

      - name: Build (Unix)
        if: runner.os != 'Windows'
        run: cargo build -p openzax-cli --release --target ${{ matrix.target }}

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: cargo build -p openzax-cli --release --target ${{ matrix.target }}

      - name: Package (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.asset }} openzax
          cd ../../..

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "target/${{ matrix.target }}/release/openzax.exe" -DestinationPath "${{ matrix.asset }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}

  release:
    needs: build
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
        continue-on-error: true

      - name: List artifacts
        run: find artifacts -type f || echo "No artifacts found"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
          body: |
            ## OpenZax v0.5.0

            Secure AI development assistant with a terminal-native UI.

            ### Install

            **Linux/macOS:**
            ```bash
            curl -fsSL https://raw.githubusercontent.com/zAxCoder/OpenZax/master/install.sh | bash
            ```

            **Windows (PowerShell):**
            ```powershell
            irm https://raw.githubusercontent.com/zAxCoder/OpenZax/master/install.ps1 | iex
            ```

            ### Free Models Included
            - Trinity Large (Arcee AI) — 128K
            - Step 3.5 Flash — 256K
            - DeepSeek R1 — 128K
            - Qwen3 235B, Llama 3.3 70B, Mistral Small 3.1
            - Groq: Llama 3.3 70B, Mixtral 8x7B
            - Cerebras: Llama 3.3 70B, Qwen3 32B

            Get free API keys at [openrouter.ai/keys](https://openrouter.ai/keys) (no credit card)
