name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build-linux:
    name: Build Linux x86_64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: System deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            pkg-config \
            libssl-dev \
            build-essential \
            libsqlite3-dev \
            libdbus-1-dev

      - name: Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: linux-x86_64-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: linux-x86_64-

      - name: Build
        run: |
          cargo build -p openzax-cli --release 2>&1
          echo "Exit: $?"

      - name: Package
        run: tar czf openzax-linux-x86_64.tar.gz -C target/release openzax

      - uses: actions/upload-artifact@v4
        with:
          name: openzax-linux-x86_64.tar.gz
          path: openzax-linux-x86_64.tar.gz

  build-macos:
    name: Build macOS ARM64
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: macos-aarch64-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: macos-aarch64-

      - name: Build
        run: cargo build -p openzax-cli --release --target aarch64-apple-darwin

      - name: Package
        run: tar czf openzax-macos-aarch64.tar.gz -C target/aarch64-apple-darwin/release openzax

      - uses: actions/upload-artifact@v4
        with:
          name: openzax-macos-aarch64.tar.gz
          path: openzax-macos-aarch64.tar.gz

  build-windows:
    name: Build Windows x86_64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: windows-x86_64-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: windows-x86_64-

      - name: Build
        run: cargo build -p openzax-cli --release

      - name: Package
        run: Compress-Archive -Path target/release/openzax.exe -DestinationPath openzax-windows-x86_64.zip

      - uses: actions/upload-artifact@v4
        with:
          name: openzax-windows-x86_64.zip
          path: openzax-windows-x86_64.zip

  release:
    needs: [build-linux, build-macos, build-windows]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
        continue-on-error: true

      - name: List artifacts
        run: find artifacts -type f 2>/dev/null || echo "No artifacts"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
          generate_release_notes: true
          body: |
            ## OpenZax v0.5.0

            Secure AI development assistant — terminal-native, built in Rust.

            ### One-line Install

            **Linux / macOS:**
            ```bash
            curl -fsSL https://raw.githubusercontent.com/zAxCoder/OpenZax/master/install.sh | bash
            ```

            **Windows (PowerShell):**
            ```powershell
            irm https://raw.githubusercontent.com/zAxCoder/OpenZax/master/install.ps1 | iex
            ```

            Then type `openzax` anywhere.

            ### Free Models (no credit card needed)
            - **Trinity Large** (Arcee AI) — coding specialist, 128K
            - **Step 3.5 Flash** — fast reasoning, 256K  
            - **DeepSeek R1** — deep reasoning, 128K
            - **Qwen3 235B**, **Llama 3.3 70B**, **Mistral Small 3.1**
            - Groq: ultra-fast Llama 3.3, Mixtral 8x7B
            - Cerebras: Llama 3.3 70B, Qwen3 32B

            Get your free API key → [openrouter.ai/keys](https://openrouter.ai/keys)
